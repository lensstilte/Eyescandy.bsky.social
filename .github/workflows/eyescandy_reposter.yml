name: EyesCandy Reposter

on:
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: eyescandy-reposter
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_EYESCANDY }}
      BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_EYESCANDY }}
      STATE_FILE: state_eyescandy.json
      MAX_PER_RUN: 100
      MAX_PER_USER: 3
      SLEEP_SECONDS: 1.5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install atproto

      - name: Run repost bot
        run: python eyescandy_reposter.py

      - name: Commit reposted state file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state_eyescandy.json
          git commit -m "Update eyescandy reposted state" || echo "No changes"
          git push
